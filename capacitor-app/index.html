<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cineby (Capacitor demo)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Cineby — Demo</h1>
      </header>

      <main>
        <p>
          This demo shows rotate/fullscreen controls for video players on the
          site.
        </p>
        <div class="controls">
          <button id="rotateBtn">Rotate</button>
          <button id="fullBtn">Fullscreen Video</button>
          <button id="openBtn">Open cineby.at</button>
        </div>
        <div class="note">
          Note: native iOS orientation override requires native plugin / native
          code.
        </div>
      </main>
    </div>

    <script src="src/app.js"></script>
  </body>
</html>
